<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="description" content="10X Board — diário de treino, recuperação e metas" />

    <!-- PWA / add-to-home-screen -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="10X Board" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>10X Board</title>

    <!-- Tailwind core utility classes via CDN (no build step needed for CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body style="margin:0; background:#0A0A0F;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
